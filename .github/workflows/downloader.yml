name: 📥 Auto Downloader & Splitter

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '🔗 File URL to download'
        required: true
        type: string
      output_name:
        description: '📁 Output folder & final file name (Optional - otherwise extracted from URL)'
        required: false
        type: string
      part_size:
        description: '✂️ Part size for splitting AFTER download (e.g., 49M, 100M)'
        required: false
        default: '49M'
        type: string
      download_chunk_size:
        description: '📦 Chunk size for partial download (e.g., 4G, 500M) - leave empty to download full file'
        required: false
        default: '4G'
        type: string
      download_part_number:
        description: '🔢 Which chunk to download? (1, 2, 3, ... or "all") - Only works with download_chunk_size'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🗂️ Create base downloads directory
        run: mkdir -p downloads

      - name: 📝 Extract filename from URL or use input
        id: filenames
        run: |
          if [ -n "${{ inputs.output_name }}" ]; then
            FOLDER_NAME="${{ inputs.output_name }}"
            ORIGINAL_FILENAME="${{ inputs.output_name }}"
          else
            BASENAME=$(basename "${{ inputs.download_url }}" | sed 's/?.*//')
            FOLDER_NAME="$BASENAME"
            ORIGINAL_FILENAME="$BASENAME"
          fi
          # Sanitize folder name (replace unwanted chars)
          FOLDER_NAME=$(echo "$FOLDER_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "folder_name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          echo "original_filename=$ORIGINAL_FILENAME" >> $GITHUB_OUTPUT

      - name: 🔍 Get total file size (for partial download)
        id: get_size
        run: |
          TOTAL_SIZE=$(curl -sI "${{ inputs.download_url }}" | grep -i "content-length" | tail -1 | awk '{print $2}' | tr -d '\r')
          if [ -z "$TOTAL_SIZE" ]; then
            TOTAL_SIZE=0
          fi
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "📊 Total file size: $TOTAL_SIZE bytes"

      - name: 🧮 Calculate chunk ranges
        id: ranges
        run: |
          CHUNK_SIZE_RAW="${{ inputs.download_chunk_size }}"
          PART_NUMBER="${{ inputs.download_part_number }}"
          TOTAL_SIZE=${{ steps.get_size.outputs.total_size }}
          
          # Parse chunk size to bytes
          CHUNK_SIZE_NUM=$(echo "$CHUNK_SIZE_RAW" | sed 's/[^0-9]//g')
          CHUNK_SIZE_UNIT=$(echo "$CHUNK_SIZE_RAW" | sed 's/[0-9]//g' | tr '[:lower:]' '[:upper:]')
          
          case $CHUNK_SIZE_UNIT in
            G) CHUNK_SIZE_BYTES=$((CHUNK_SIZE_NUM * 1024 * 1024 * 1024)) ;;
            M) CHUNK_SIZE_BYTES=$((CHUNK_SIZE_NUM * 1024 * 1024)) ;;
            K) CHUNK_SIZE_BYTES=$((CHUNK_SIZE_NUM * 1024)) ;;
            B|"") CHUNK_SIZE_BYTES=$CHUNK_SIZE_NUM ;;
            *) CHUNK_SIZE_BYTES=$CHUNK_SIZE_NUM ;;
          esac
          
          # Calculate number of chunks needed
          if [ $TOTAL_SIZE -gt 0 ]; then
            TOTAL_CHUNKS=$(( (TOTAL_SIZE + CHUNK_SIZE_BYTES - 1) / CHUNK_SIZE_BYTES ))
          else
            TOTAL_CHUNKS=1
          fi
          
          echo "chunk_size_bytes=$CHUNK_SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "total_chunks=$TOTAL_CHUNKS" >> $GITHUB_OUTPUT
          
          # Calculate range for specific part
          if [ "$PART_NUMBER" != "all" ] && [ -n "$CHUNK_SIZE_RAW" ] && [ $TOTAL_SIZE -gt 0 ]; then
            START_BYTE=$(( (PART_NUMBER - 1) * CHUNK_SIZE_BYTES ))
            END_BYTE=$(( PART_NUMBER * CHUNK_SIZE_BYTES - 1 ))
            if [ $END_BYTE -ge $TOTAL_SIZE ]; then
              END_BYTE=$(( TOTAL_SIZE - 1 ))
            fi
            echo "start_byte=$START_BYTE" >> $GITHUB_OUTPUT
            echo "end_byte=$END_BYTE" >> $GITHUB_OUTPUT
            echo "is_partial=true" >> $GITHUB_OUTPUT
          else
            echo "is_partial=false" >> $GITHUB_OUTPUT
          fi

      - name: ⬇️ Download file (full or partial)
        id: download
        run: |
          if [ "${{ steps.ranges.outputs.is_partial }}" == "true" ]; then
            START=${{ steps.ranges.outputs.start_byte }}
            END=${{ steps.ranges.outputs.end_byte }}
            TOTAL_SIZE=${{ steps.get_size.outputs.total_size }}
            CHUNK_SIZE="${{ inputs.download_chunk_size }}"
            PART_NUM="${{ inputs.download_part_number }}"
            TOTAL_CHUNKS=${{ steps.ranges.outputs.total_chunks }}
            
            echo "📥 Downloading PART $PART_NUM of $TOTAL_CHUNKS (${CHUNK_SIZE} chunks)"
            echo "📊 Range: $START - $END (size: $((END - START + 1)) bytes)"
            
            curl -L --retry 3 \
              -H "Range: bytes=$START-$END" \
              "${{ inputs.download_url }}" \
              -o "temp_downloaded_file"
            
            ACTUAL_SIZE=$(stat -c%s "temp_downloaded_file")
            echo "✅ Downloaded $ACTUAL_SIZE bytes"
            echo "file_size=$ACTUAL_SIZE" >> $GITHUB_OUTPUT
            echo "is_partial=true" >> $GITHUB_OUTPUT
            echo "downloaded_part=$PART_NUM" >> $GITHUB_OUTPUT
          else
            echo "📥 Downloading FULL file"
            curl -L --retry 3 "${{ inputs.download_url }}" -o "temp_downloaded_file"
            FILE_SIZE=$(stat -c%s "temp_downloaded_file")
            echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
            echo "is_partial=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Generate output filename (with part suffix if partial)
        id: output_name
        run: |
          if [ "${{ steps.download.outputs.is_partial }}" == "true" ]; then
            PART_NUM=${{ steps.download.outputs.downloaded_part }}
            TOTAL_CHUNKS=${{ steps.ranges.outputs.total_chunks }}
            BASE_NAME="${{ steps.filenames.outputs.original_filename }}"
            EXTRA_SUFFIX="_part${PART_NUM}_of_${TOTAL_CHUNKS}"
            FINAL_FILENAME="${BASE_NAME}${EXTRA_SUFFIX}"
          else
            FINAL_FILENAME="${{ steps.filenames.outputs.original_filename }}"
          fi
          echo "final_filename=$FINAL_FILENAME" >> $GITHUB_OUTPUT

      - name: 🧠 Check file size vs part size (for splitting AFTER download)
        id: check
        run: |
          PART_SIZE_NUM=$(echo "${{ inputs.part_size }}" | sed 's/[^0-9]//g')
          PART_SIZE_UNIT=$(echo "${{ inputs.part_size }}" | sed 's/[0-9]//g')
          case $PART_SIZE_UNIT in
            M|m) PART_SIZE_BYTES=$((PART_SIZE_NUM * 1024 * 1024)) ;;
            K|k) PART_SIZE_BYTES=$((PART_SIZE_NUM * 1024)) ;;
            G|g) PART_SIZE_BYTES=$((PART_SIZE_NUM * 1024 * 1024 * 1024)) ;;
            *) PART_SIZE_BYTES=$PART_SIZE_NUM ;;
          esac
          echo "part_size_bytes=$PART_SIZE_BYTES" >> $GITHUB_OUTPUT
          
          FILE_SIZE=${{ steps.download.outputs.file_size }}
          if [ $FILE_SIZE -lt $PART_SIZE_BYTES ]; then
            echo "should_split=false" >> $GITHUB_OUTPUT
          else
            echo "should_split=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Upload directly (no split after download)
        if: steps.check.outputs.should_split == 'false'
        run: |
          TARGET_FILE="downloads/${{ steps.output_name.outputs.final_filename }}"
          mv temp_downloaded_file "$TARGET_FILE"
          
          if [ "${{ steps.download.outputs.is_partial }}" == "true" ]; then
            echo "✅ Partial chunk downloaded (Part ${{ steps.download.outputs.downloaded_part }}) - saved as: $TARGET_FILE"
          else
            echo "✅ Full file downloaded - saved as: $TARGET_FILE"
          fi

      - name: ✂️ Split downloaded file into smaller parts (for storage)
        if: steps.check.outputs.should_split == 'true'
        run: |
          TARGET="downloads/${{ steps.output_name.outputs.final_filename }}_split"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          split -b "${{ inputs.part_size }}" -d -a 3 temp_downloaded_file "$TARGET/part_"
          rm -f temp_downloaded_file
          
          # Move the reassembly scripts into the split folder
          cat > "$TARGET/reassemble.sh" << 'EOF'
          #!/bin/bash
          PARTS_DIR="$(cd "$(dirname "$0")" && pwd)"
          OUTPUT_FILE="${PARTS_DIR}/ORIG_NAME_PLACEHOLDER"
          echo "🔄 Reassembling parts into: $OUTPUT_FILE"
          cat "${PARTS_DIR}"/part_* > "$OUTPUT_FILE"
          echo "✅ Done. File size: $(stat -c%s "$OUTPUT_FILE") bytes"
          EOF
          
          cat > "$TARGET/reassemble.ps1" << 'EOF'
          $partsDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          $outputFile = Join-Path $partsDir "ORIG_NAME_PLACEHOLDER"
          Write-Host "🔄 Reassembling parts into: $outputFile"
          $parts = Get-ChildItem -Path $partsDir -Filter "part_*" | Sort-Object Name
          $fileStream = [System.IO.File]::OpenWrite($outputFile)
          foreach ($part in $parts) {
              $bytes = [System.IO.File]::ReadAllBytes($part.FullName)
              $fileStream.Write($bytes, 0, $bytes.Length)
          }
          $fileStream.Close()
          Write-Host "✅ Done. File size: $((Get-Item $outputFile).Length) bytes"
          EOF
          
          sed -i "s/ORIG_NAME_PLACEHOLDER/${{ steps.output_name.outputs.final_filename }}/g" "$TARGET/reassemble.sh"
          sed -i "s/ORIG_NAME_PLACEHOLDER/${{ steps.output_name.outputs.final_filename }}/g" "$TARGET/reassemble.ps1"
          chmod +x "$TARGET/reassemble.sh"

      - name: 📦 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ "${{ steps.check.outputs.should_split }}" == "true" ]; then
            TARGET_DIR="downloads/${{ steps.output_name.outputs.final_filename }}_split"
            git add "$TARGET_DIR"
            COMMIT_MSG="✂️ Split: ${{ steps.output_name.outputs.final_filename }} (post-download split into ${{ inputs.part_size }} parts)"
          else
            git add "downloads/${{ steps.output_name.outputs.final_filename }}"
            COMMIT_MSG="📄 Add: ${{ steps.output_name.outputs.final_filename }}"
          fi
          
          git commit -m "$COMMIT_MSG" || echo "Nothing to commit"
          git push
